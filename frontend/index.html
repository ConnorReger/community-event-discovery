<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DropPin</title>
 
  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
 
  <!-- App CSS -->
  <link rel="stylesheet" href="style.css" />

<body>
 
  <div id="app">
 
    <header id="topbar-main">

      <!-- <div class="hero-actions">
        <button class="btn">Log in</button>

      </div>       -->
      <div class="hero-actions">
        <a class="btn" href="login.html" style="text-decoration: none;">Log in</a>
        <a class="btn primary" id="new-event-btn" href="login.html" style="text-decoration: none;">+ Create Event</a>
      </div>
      <div id="map-container-main">
        <div id="map"></div>
        <!-- Full size button rests over the map-->
        <a href="map.html" id="fullsize-btn">⛶ Full Size</a>
